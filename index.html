<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEON TETRIS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;
  overflow:hidden;touch-action:none;user-select:none;
  -webkit-user-select:none;-webkit-tap-highlight-color:transparent;
}
.container{
  display:flex;gap:20px;align-items:flex-start;padding:10px;
  max-width:600px;width:100%;flex-wrap:wrap;justify-content:center;
}
.board-wrap{position:relative}
canvas#board{
  border:2px solid rgba(100,200,255,0.3);
  border-radius:8px;box-shadow:0 0 40px rgba(0,150,255,0.15),inset 0 0 40px rgba(0,0,0,0.5);
  background:#0d0d1a;display:block;max-width:100%;
}
.sidebar{
  display:flex;flex-direction:column;gap:12px;min-width:140px;
}
.panel{
  background:rgba(15,15,30,0.9);border:1px solid rgba(100,200,255,0.2);
  border-radius:10px;padding:14px;backdrop-filter:blur(10px);
}
.panel h3{
  color:rgba(100,200,255,0.7);font-size:11px;text-transform:uppercase;
  letter-spacing:2px;margin-bottom:8px;
}
.score-val{color:#00e5ff;font-size:36px;font-weight:700;text-shadow:0 0 20px rgba(0,229,255,0.5)}
.level-val{color:#76ff03;font-size:20px;font-weight:600}
.lines-val{color:#ff6d00;font-size:20px;font-weight:600}
.next-preview{display:flex;justify-content:center;align-items:center;min-height:80px}
canvas#next{display:block}
.controls{display:flex;flex-direction:column;gap:8px}
.btn{
  background:rgba(100,200,255,0.1);border:1px solid rgba(100,200,255,0.3);
  color:#b0d0ff;padding:10px 16px;border-radius:8px;cursor:pointer;
  font-size:14px;font-weight:600;transition:all 0.2s;text-align:center;
}
.btn:hover,.btn:active{background:rgba(100,200,255,0.25);border-color:rgba(100,200,255,0.6);color:#fff}
.btn.pause{background:rgba(255,100,0,0.15);border-color:rgba(255,100,0,0.4);color:#ff9040}
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);display:flex;justify-content:center;align-items:center;
  z-index:100;backdrop-filter:blur(5px);
}
.overlay.hidden{display:none}
.overlay-content{text-align:center;padding:40px}
.overlay-content h1{
  color:#00e5ff;font-size:48px;font-weight:900;text-shadow:0 0 40px rgba(0,229,255,0.6);margin-bottom:10px;
}
.overlay-content .sub{color:rgba(180,210,255,0.6);font-size:16px;margin-bottom:20px}
.overlay-content .final-score{color:#76ff03;font-size:24px;margin-bottom:24px}
.mobile-controls{
  display:none;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;
  gap:6px;width:100%;max-width:300px;margin-top:10px;
}
.mobile-btn{
  background:rgba(100,200,255,0.08);border:1px solid rgba(100,200,255,0.2);
  border-radius:10px;color:rgba(180,210,255,0.7);font-size:24px;
  display:flex;align-items:center;justify-content:center;
  min-height:50px;cursor:pointer;transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.mobile-btn:active{background:rgba(100,200,255,0.3);border-color:rgba(100,200,255,0.6);color:#fff;transform:scale(0.95)}
.arrow-up{grid-column:2;grid-row:1}
.arrow-left{grid-column:1;grid-row:2}
.arrow-right{grid-column:3;grid-row:2}
.arrow-down{grid-column:2;grid-row:3}
.rotate-btn{grid-column:3;grid-row:1}
.drop-btn{grid-column:1;grid-row:3}

@media(max-width:500px){
  .container{flex-direction:column;align-items:center;gap:10px}
  .sidebar{flex-direction:row;flex-wrap:wrap;gap:8px;justify-content:center}
  .panel{padding:8px 12px}
  .score-val{font-size:24px}
  .btn{padding:8px 12px;font-size:12px}
  .mobile-controls{display:grid}
}
@media(min-width:501px){.mobile-controls{display:none !important}}
@keyframes particle{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
.particle{position:absolute;width:4px;height:4px;border-radius:50%;pointer-events:none;animation:particle 0.6s ease-out forwards}
.flash{animation:flash 0.3s ease-out}@keyframes flash{0%{filter:brightness(2)}100%{filter:brightness(1)}}
</style>
</head>
<body>

<div class="container">
  <div class="board-wrap" id="boardWrap">
    <canvas id="board"></canvas>
  </div>
  <div class="sidebar">
    <div class="panel">
      <h3>SCORE</h3>
      <div class="score-val" id="score">0</div>
    </div>
    <div class="panel">
      <h3>LEVEL</h3>
      <div class="level-val" id="level">1</div>
    </div>
    <div class="panel">
      <h3>LINES</h3>
      <div class="lines-val" id="lines">0</div>
    </div>
    <div class="panel">
      <h3>NEXT</h3>
      <div class="next-preview"><canvas id="next"></canvas></div>
    </div>
    <div class="controls">
      <button class="btn pause" id="pauseBtn" onclick="togglePause()">⏸ PAUSE</button>
      <button class="btn" onclick="resetGame()">🔄 RESTART</button>
    </div>
  </div>
  <div class="mobile-controls" id="mobileControls">
    <button class="mobile-btn rotate-btn" id="rotateBtn">↻</button>
    <button class="mobile-btn arrow-up" id="upBtn">▲</button>
    <button class="mobile-btn arrow-left" id="leftBtn">◀</button>
    <button class="mobile-btn arrow-down" id="downBtn">▼</button>
    <button class="mobile-btn arrow-right" id="rightBtn">▶</button>
    <button class="mobile-btn drop-btn" id="dropBtn">⏬</button>
  </div>
</div>

<div class="overlay hidden" id="gameOverOverlay">
  <div class="overlay-content">
    <h1>GAME OVER</h1>
    <div class="sub">Final Score</div>
    <div class="final-score" id="finalScore">0</div>
    <div class="sub" id="finalLines" style="color:#ff6d00;margin-top:-16px"></div>
    <button class="btn" onclick="resetGame()" style="font-size:20px;padding:14px 32px;">🔄 PLAY AGAIN</button>
  </div>
</div>

<div class="overlay" id="startOverlay">
  <div class="overlay-content">
    <h1>NEON TETRIS</h1>
    <div class="sub">A modern twist on the classic</div>
    <button class="btn" onclick="startGame()" style="font-size:20px;padding:14px 32px;margin-top:10px;">▶ START</button>
    <div class="sub" style="margin-top:12px;font-size:13px">⌨️ Arrows + Space | 📱 Touch controls</div>
  </div>
</div>

<script>
// ── Audio engine ──
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function playTone(freq,dur,type='square',vol=0.08){
  if(audioCtx.state==='suspended') audioCtx.resume();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxMove(){playTone(200,0.06,'square',0.04)}
function sfxRotate(){playTone(300,0.08,'square',0.05)}
function sfxDrop(){playTone(80,0.15,'triangle',0.07)}
function sfxClear(n){
  const base=[523,659,784,1047][Math.min(n-1,3)];
  playTone(base,0.15,'square',0.08);
  setTimeout(()=>playTone(base*1.25,0.12,'square',0.06),80);
  setTimeout(()=>playTone(base*1.5,0.1,'square',0.05),160);
}
function sfxGameOver(){
  playTone(200,0.2,'sawtooth',0.1);
  setTimeout(()=>playTone(150,0.3,'sawtooth',0.08),200);
  setTimeout(()=>playTone(100,0.5,'triangle',0.06),400);
}

// ── Constants ──
const COLS=10,ROWS=20;
const COLORS=['#00e5ff','#2979ff','#ff6d00','#ffea00','#76ff03','#d500f9','#ff1744'];
const GLOW=['rgba(0,229,255,0.6)','rgba(41,121,255,0.6)','rgba(255,109,0,0.6)','rgba(255,234,0,0.6)','rgba(118,255,3,0.6)','rgba(213,0,249,0.6)','rgba(255,23,68,0.6)'];

// I J L O S T Z
const SHAPES=[
  [[1,1,1,1]], // I
  [[1,0,0],[1,1,1]], // J
  [[0,0,1],[1,1,1]], // L
  [[1,1],[1,1]], // O
  [[0,1,1],[1,1,0]], // S
  [[0,1,0],[1,1,1]], // T
  [[1,1,0],[0,1,1]], // Z
];

// ── State ──
let board,current,nextPiece,score,level,lines,gameRunning,gamePaused;
let dropInterval,dropTimer,animFrame;
let cellSize;

function createPiece(idx){
  const shape=SHAPES[idx].map(r=>[...r]);
  return{shape,color:idx,x:Math.floor((COLS-shape[0].length)/2),y:0};
}

function randomPiece(){return createPiece(Math.floor(Math.random()*SHAPES.length))}

function newBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(-1))}

function collides(piece,dx=0,dy=0){
  for(let r=0;r<piece.shape.length;r++)
    for(let c=0;c<piece.shape[r].length;c++)
      if(piece.shape[r][c]){
        const nx=piece.x+c+dx,ny=piece.y+r+dy;
        if(nx<0||nx>=COLS||ny>=ROWS) return true;
        if(ny>=0&&board[ny][nx]!==-1) return true;
      }
  return false;
}

function merge(){
  for(let r=0;r<current.shape.length;r++)
    for(let c=0;c<current.shape[r].length;c++)
      if(current.shape[r][c]){
        const y=current.y+r,x=current.x+c;
        if(y>=0) board[y][x]=current.color;
      }
}

function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c!==-1)){
      board.splice(r,1);board.unshift(Array(COLS).fill(-1));
      cleared++;r++;
    }
  }
  if(cleared){
    sfxClear(cleared);
    spawnParticles(cleared);
    const basePoints=[0,100,300,500,800];
    lines+=cleared;
    score+=basePoints[cleared]*level;
    level=Math.floor(lines/10)+1;
    updateDisplay();
  }
}

function spawnParticles(count){
  const wrap=document.getElementById('boardWrap');
  const boardEl=document.getElementById('board');
  const rect=boardEl.getBoundingClientRect();
  for(let i=0;i<count*12;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.cssText=`
      left:${rect.left+Math.random()*rect.width}px;
      top:${rect.top+Math.random()*rect.height}px;
      --dx:${(Math.random()-0.5)*120}px;
      --dy:${(Math.random()-0.5)*120-40}px;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
      box-shadow:0 0 6px currentColor;z-index:50;
    `;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
  boardEl.classList.add('flash');
  setTimeout(()=>boardEl.classList.remove('flash'),300);
}

function spawnPiece(){
  current=nextPiece||randomPiece();
  nextPiece=randomPiece();
  if(collides(current)) gameOver();
  dropTimer=0;
}

function moveDown(){
  if(!collides(current,0,1)){
    current.y++;sfxMove();return true;
  }
  merge();clearLines();spawnPiece();return false;
}

function hardDrop(){
  while(!collides(current,0,1)) current.y++;
  sfxDrop();merge();clearLines();spawnPiece();
}

function moveLeft(){if(!collides(current,-1)){current.x--;sfxMove()}}
function moveRight(){if(!collides(current,1)){current.x++;sfxMove()}}
function rotate(){
  const rotated=current.shape[0].map((_,i)=>current.shape.map(r=>r[i]).reverse());
  const oldShape=current.shape;
  current.shape=rotated;
  if(collides(current)){
    // Wall kick: try offsets
    for(const dx of[-1,1,-2,2]){
      current.x+=dx;
      if(!collides(current)){sfxRotate();return}
      current.x-=dx;
    }
    current.shape=oldShape;
  }else{sfxRotate()}
}

function gameOver(){
  gameRunning=false;clearInterval(dropInterval);cancelAnimationFrame(animFrame);
  sfxGameOver();
  document.getElementById('finalScore').textContent=score;
  document.getElementById('finalLines').textContent=`${lines} lines · Level ${level}`;
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function updateDisplay(){
  document.getElementById('score').textContent=score;
  document.getElementById('level').textContent=level;
  document.getElementById('lines').textContent=lines;
}

// ── Rendering ──
const boardCanvas=document.getElementById('board');
const boardCtx=boardCanvas.getContext('2d');
const nextCanvas=document.getElementById('next');
const nextCtx=nextCanvas.getContext('2d');

function resize(){
  const maxW=Math.min(window.innerWidth-40,400);
  cellSize=Math.floor(maxW/COLS);
  boardCanvas.width=cellSize*COLS;boardCanvas.height=cellSize*ROWS;
  nextCanvas.width=cellSize*5;nextCanvas.height=cellSize*4;
}

function drawCell(ctx,x,y,colorIdx,alpha=1){
  const xp=x*cellSize,yp=y*cellSize,sz=cellSize;
  const color=COLORS[colorIdx];
  const glow=GLOW[colorIdx];

  // Main fill
  ctx.fillStyle=color;
  ctx.globalAlpha=alpha;
  ctx.fillRect(xp+1,yp+1,sz-2,sz-2);

  // Inner highlight
  const grad=ctx.createLinearGradient(xp,yp,xp+sz,yp+sz);
  grad.addColorStop(0,'rgba(255,255,255,0.25)');
  grad.addColorStop(0.5,'rgba(255,255,255,0.05)');
  grad.addColorStop(1,'rgba(0,0,0,0.2)');
  ctx.fillStyle=grad;
  ctx.fillRect(xp+2,yp+2,sz-4,sz-4);

  // Glow border
  ctx.strokeStyle=glow;
  ctx.globalAlpha=alpha*0.6;
  ctx.lineWidth=1.5;
  ctx.strokeRect(xp+0.75,yp+0.75,sz-1.5,sz-1.5);
  ctx.globalAlpha=1;
}

function drawGrid(){
  const ctx=boardCtx;
  ctx.clearRect(0,0,boardCanvas.width,boardCanvas.height);
  // Grid lines
  ctx.strokeStyle='rgba(100,200,255,0.06)';
  ctx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*cellSize);ctx.lineTo(COLS*cellSize,r*cellSize);ctx.stroke()}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*cellSize,0);ctx.lineTo(c*cellSize,ROWS*cellSize);ctx.stroke()}
}

function render(){
  if(!gameRunning) return;
  const ctx=boardCtx;
  drawGrid();

  // Board
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      if(board[r][c]!==-1) drawCell(ctx,c,r,board[r][c]);

  // Ghost piece
  if(current){
    let ghostY=current.y;
    while(!collides(current,0,ghostY-current.y+1)) ghostY++;
    if(ghostY!==current.y){
      for(let r=0;r<current.shape.length;r++)
        for(let c=0;c<current.shape[r].length;c++)
          if(current.shape[r][c])
            drawCell(ctx,current.x+c,ghostY+r,current.color,0.2);
    }
    // Current piece
    for(let r=0;r<current.shape.length;r++)
      for(let c=0;c<current.shape[r].length;c++)
        if(current.shape[r][c])
          drawCell(ctx,current.x+c,current.y+r,current.color);
  }

  // Next piece
  const nctx=nextCtx;
  nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);
  if(nextPiece){
    const offX=Math.floor((5-nextPiece.shape[0].length)/2);
    const offY=Math.floor((4-nextPiece.shape.length)/2);
    for(let r=0;r<nextPiece.shape.length;r++)
      for(let c=0;c<nextPiece.shape[r].length;c++)
        if(nextPiece.shape[r][c])
          drawCell(nctx,offX+c,offY+r,nextPiece.color);
  }

  animFrame=requestAnimationFrame(render);
}

// ── Game loop ──
function gameLoop(){
  if(!gameRunning||gamePaused) return;
  dropTimer+=16.67;
  const speed=Math.max(50,800-(level-1)*70);
  if(dropTimer>=speed){moveDown();dropTimer=0;}
}

function togglePause(){
  if(!gameRunning) return;
  gamePaused=!gamePaused;
  document.getElementById('pauseBtn').textContent=gamePaused?'▶ RESUME':'⏸ PAUSE';
  if(!gamePaused) dropTimer=0;
}

function resetGame(){
  document.getElementById('gameOverOverlay').classList.add('hidden');
  document.getElementById('startOverlay').classList.add('hidden');
  board=newBoard();score=0;level=1;lines=0;
  gameRunning=true;gamePaused=false;
  document.getElementById('pauseBtn').textContent='⏸ PAUSE';
  updateDisplay();
  nextPiece=randomPiece();spawnPiece();
  clearInterval(dropInterval);
  dropInterval=setInterval(gameLoop,16.67);
  cancelAnimationFrame(animFrame);
  render();resize();
}

function startGame(){
  resetGame();
}

// ── Controls ──
document.addEventListener('keydown',e=>{
  if(!gameRunning||gamePaused) return;
  switch(e.key){
    case 'ArrowLeft':e.preventDefault();moveLeft();break;
    case 'ArrowRight':e.preventDefault();moveRight();break;
    case 'ArrowDown':e.preventDefault();moveDown();break;
    case 'ArrowUp':e.preventDefault();rotate();break;
    case ' ':e.preventDefault();hardDrop();break;
    case 'p':case 'P':e.preventDefault();togglePause();break;
  }
});

// Touch controls
['leftBtn','rightBtn','downBtn','upBtn','rotateBtn','dropBtn'].forEach(id=>{
  const btn=document.getElementById(id);
  btn.addEventListener('touchstart',e=>{e.preventDefault();handleMobileBtn(id)});
  btn.addEventListener('mousedown',e=>{e.preventDefault();handleMobileBtn(id)});
});

function handleMobileBtn(id){
  if(!gameRunning||gamePaused) return;
  switch(id){
    case 'leftBtn':moveLeft();break;
    case 'rightBtn':moveRight();break;
    case 'downBtn':moveDown();break;
    case 'upBtn':hardDrop();break;
    case 'rotateBtn':rotate();break;
    case 'dropBtn':hardDrop();break;
  }
}

// Swipe on board
let touchStartY=0;
boardCanvas.addEventListener('touchstart',e=>{
  touchStartY=e.touches[0].clientY;
});
boardCanvas.addEventListener('touchend',e=>{
  if(!gameRunning||gamePaused) return;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(dy<-40) hardDrop();
  else if(dy>40) moveDown();
});

window.addEventListener('resize',resize);

// ── Init ──
resize();
document.getElementById('startOverlay').classList.remove('hidden');
</script>
</body>
</html>
